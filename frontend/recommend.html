<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce AI - For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">E-Comm AI</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="recommend.html" class="active">For You</a>
            <a href="trending.html">Trending</a>

        </div>
    </nav>

    <main>
        <h1>Personalized Recommendations</h1>
        <p style="margin-bottom: 2rem; color: var(--text-secondary);">Enter a User ID (e.g. 101, 555) to simulate personalized product discovery.</p>
        
        <div class="search-container">
            <input type="number" id="user-id-input" placeholder="Enter User ID..." min="1" max="100000">
            <button onclick="fetchRecommendations()">Get Recommendations</button>
        </div>

        <h2 id="algo-info" style="font-size: 1.2rem; color: var(--accent-color);"></h2>
        <div class="loader" id="loader"></div>
        <div class="product-grid" id="recommendation-grid"></div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
